name: CI Pipeline              # Workflow name (shows in GitHub UI)

on: [push, pull_request]      # When to run this workflow

jobs:
  # ── Backend Job ──────────────────────────────────────────────────────────
  backend:
    name: Backend – Install & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: todo-project/backend   # All `run` steps use this dir

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: todo-project/backend/package-lock.json

      - name: Install dependencies
        run: npm ci                                # Clean install from lockfile

      - name: Verify server entry-point exists
        run: node -e "require('./src/server.js')" # Smoke-check: server loads without crashing
        # Replace the step above with `npm test` once you add a test runner (e.g. Jest/Mocha)
